<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link rel="stylesheet" href="https://getbootstrap.com/docs/5.3/dist/css/bootstrap.min.css">
    <link href="/static/css/forum.css" rel="stylesheet">
  </head>
  <body>
    <header class="blog-header py-3 text-center">
      <a class="blog-header-logo text-dark" href="/">Forum</a>
    </header>
    <div class="container">
      <main class="form-signin w-100 m-auto">
        <form method="POST" action="/login">
          <h1 class="h3 mb-3 fw-normal">Please sign in</h1>
          {{if .Error}}
            <div class="alert alert-danger">{{.Error}}</div>
          {{end}}
          <div class="form-floating mb-2">
            <input type="text" class="form-control" id="login" name="login" placeholder="Email or Username" required>
            <label for="login">Email or Username</label>
          </div>
          <div class="form-floating mb-2">
            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
            <label for="password">Password</label>
          </div>
          <button class="w-100 btn btn-lg btn-primary" type="submit">Sign in</button>
          <p class="mt-3 mb-3 text-muted">Don't have an account? <a href="/register">Register</a></p>
        </form>
      </main>
    </div>
    <footer class="blog-footer">
      <a href="#top" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">&#8679; Наверх</a>
    </footer>
  </body>
</html>
