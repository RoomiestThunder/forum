<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="https://getbootstrap.com/docs/5.3/dist/css/bootstrap.min.css">
    <link href="/static/css/forum.css" rel="stylesheet">
  </head>
  <body>
    <header class="blog-header py-3 text-center">
      <a class="blog-header-logo text-dark" href="/">Forum</a>
    </header>
    <div class="container">
      <main class="form-signin w-100 m-auto">
        <form method="POST" action="/register">
          <h1 class="h3 mb-3 fw-normal">Register</h1>
          {{if .Error}}
            <div class="alert alert-danger">{{.Error}}</div>
          {{end}}
          <div class="form-floating mb-2">
            <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
            <label for="email">Email address</label>
          </div>
          <div class="form-floating mb-2">
            <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
            <label for="username">Username</label>
          </div>
          <div class="form-floating mb-2">
            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
            <label for="password">Password</label>
          </div>
          <button class="w-100 btn btn-lg btn-primary" type="submit">Register</button>
          <p class="mt-3 mb-3 text-muted">Already have an account? <a href="/login">Login</a></p>
        </form>
      </main>
    </div>
    <footer class="blog-footer">
      <a href="#top" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">&#8679; Наверх</a>
    </footer>
  </body>
</html>
