version: "2"

linters:
  default: standard
  settings:
    errcheck:
      exclude-functions:
        # These errors cannot be acted on after headers are written.
        - (net/http.ResponseWriter).Write
        - (*html/template.Template).ExecuteTemplate
        - (*encoding/json.Encoder).Encode
        # WebSocket deadline/close errors are expected on disconnect.
        - (*github.com/gorilla/websocket.Conn).WriteMessage
        - (*github.com/gorilla/websocket.Conn).SetReadDeadline
        - (*github.com/gorilla/websocket.Conn).SetWriteDeadline
        - (*github.com/gorilla/websocket.Conn).Close
        # Sscanf/ParseForm: callers validate the resulting values.
        - fmt.Sscanf
        - (*net/http.Request).ParseForm
        # tx.Rollback in defer after Commit is expected to be a no-op.
        - (*database/sql.Tx).Rollback
        # rows.Close after rows.Err is checked is safe to ignore.
        - (*database/sql.Rows).Close
